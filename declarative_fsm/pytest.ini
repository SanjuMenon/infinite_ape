[pytest]
# Pytest configuration for declarative FSM tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = .

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage options (when pytest-cov is installed)
# addopts = 
#     -v
#     --tb=short
#     --strict-markers
#     --disable-warnings
#     --cov=declarative_fsm
#     --cov-report=term-missing
#     --cov-report=html

# Markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests for full system
    slow: Tests that take a long time to run
