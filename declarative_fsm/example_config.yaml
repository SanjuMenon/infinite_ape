fields:
  collateral:
    field_selection_strategy:
      check_completeness:
        description:
          - "value_type"
          - "amount"
      convert_to_canon:
        description: True
    extraction_strategy:
      validate_type:
        description: "int"
      
    generation_strategy:
      # Nested FSM - only executes if extraction_strategy passes
      format:
        description: "table"
    validation_strategy:
      llm_eval:
        description:
          - "score how readable it is"
          - "score how complete the information is"
          - "score how accurate the data appears"
  
